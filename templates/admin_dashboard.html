<h2>Admin Dashboard</h2>
<table>
    <tr>
        <th>Username</th>
        <th>Email</th>
        <th>Role</th>
        <th>Actions</th>
    </tr>
    {% for user in users %}
    <tr>
        <td>{{ user.username }}</td>
        <td>{{ user.email }}</td>
        <td>{{ 'Admin' if user.is_admin else 'User' }}</td>
        <td>
            <!-- Only show promote button for non-admin users -->
            {% if not user.is_admin %}
            <form method="POST" action="{{ url_for('promote_user', username=user.username) }}" style="display: inline-block;">
                <button type="submit">Promote to Admin</button>
            </form>
            {% endif %}

            <!-- Delete user button with confirmation -->
            <form method="POST" action="{{ url_for('delete_user', username=user.username) }}" style="display: inline-block;">
                <button type="submit" onclick="return confirm('Are you sure you want to delete this user?');">Delete User</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
