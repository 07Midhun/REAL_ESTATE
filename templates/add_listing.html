<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Listing - Real Estate</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Video Background -->
    <div class="video-background">
        <video autoplay muted loop>
            <source src="https://player.vimeo.com/external/434045526.sd.mp4?s=c27eecc69a27dbc4ff2b87d38afc35f1a9e7c02d&profile_id=164&oauth2_token_id=57447761" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <div class="container">
        <div class="form-container glass">
            <h1 class="text-center mb-4 floating">Add New Listing</h1>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="flash flash-error">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form action="{{ url_for('sell') }}" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="title" class="form-label">
                        <i class="fas fa-home"></i> Property Title
                    </label>
                    <input type="text" id="title" name="title" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="description" class="form-label">
                        <i class="fas fa-align-left"></i> Description
                    </label>
                    <textarea id="description" name="description" class="form-control" required></textarea>
                </div>

                <div class="form-group">
                    <label for="price" class="form-label">
                        <i class="fas fa-rupee-sign"></i> Price (₹)
                    </label>
                    <input type="number" id="price" name="price" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="location" class="form-label">
                        <i class="fas fa-map-marker-alt"></i> Location
                    </label>
                    <input type="text" id="location" name="location" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="property_type" class="form-label">
                        <i class="fas fa-building"></i> Property Type
                    </label>
                    <select id="property_type" name="property_type" class="form-control" required onchange="toggleFields()">
                        <option value="">Select Property Type</option>
                        <option value="Land">Land</option>
                        <option value="House">House</option>
                        <option value="Flat">Flat</option>
                    </select>
                </div>

                <!-- Contact Information Section -->
                <div class="form-group">
                    <h3 class="mb-3 floating">
                        <i class="fas fa-address-book"></i> Contact Information
                    </h3>
                    <label for="contact_phone" class="form-label">
                        <i class="fas fa-phone"></i> Contact Phone
                    </label>
                    <input type="tel" id="contact_phone" name="contact_phone" class="form-control" placeholder="+91 98765 43210">
                </div>

                <div class="form-group">
                    <label for="contact_email" class="form-label">
                        <i class="fas fa-envelope"></i> Contact Email
                    </label>
                    <input type="email" id="contact_email" name="contact_email" class="form-control" placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label for="contact_address" class="form-label">
                        <i class="fas fa-map-marker-alt"></i> Contact Address
                    </label>
                    <textarea id="contact_address" name="contact_address" class="form-control" placeholder="Enter contact address"></textarea>
                </div>

                <!-- Property-specific fields -->
                <div id="land_fields" style="display: none;">
                    <div class="form-group">
                        <label for="acres" class="form-label">
                            <i class="fas fa-ruler-combined"></i> Acres
                        </label>
                        <input type="text" id="acres" name="acres" class="form-control">
                    </div>

                    <div class="form-group">
                        <label for="facing" class="form-label">
                            <i class="fas fa-compass"></i> Facing Direction
                        </label>
                        <input type="text" id="facing" name="facing" class="form-control" placeholder="North, South, East, West">
                    </div>
                </div>

                <div id="house_fields" style="display: none;">
                    <div class="form-group">
                        <label for="bhk" class="form-label">
                            <i class="fas fa-bed"></i> BHK
                        </label>
                        <select id="bhk" name="bhk" class="form-control">
                            <option value="1 BHK">1 BHK</option>
                            <option value="2 BHK">2 BHK</option>
                            <option value="3 BHK">3 BHK</option>
                            <option value="4 BHK">4 BHK</option>
                        </select>
                    </div>
                </div>

                <div id="flat_fields" style="display: none;">
                    <div class="form-group">
                        <label for="bhk_flat" class="form-label">
                            <i class="fas fa-bed"></i> BHK
                        </label>
                        <select id="bhk_flat" name="bhk_flat" class="form-control">
                            <option value="1 BHK">1 BHK</option>
                            <option value="2 BHK">2 BHK</option>
                            <option value="3 BHK">3 BHK</option>
                            <option value="4 BHK">4 BHK</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="image" class="form-label">
                        <i class="fas fa-image"></i> Property Image
                    </label>
                    <input type="file" id="image" name="image" class="form-control" accept="image/*" required>
                </div>

                <button type="submit" class="btn btn-primary floating" style="width: 100%;">
                    <i class="fas fa-plus-circle"></i> Add Listing
                </button>
            </form>
            
            <div class="text-center mt-3">
                <a href="{{ url_for('dashboard') }}" class="btn btn-secondary floating">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>

    <script>
        function toggleFields() {
            const propertyType = document.getElementById('property_type').value;
            const landFields = document.getElementById('land_fields');
            const houseFields = document.getElementById('house_fields');
            const flatFields = document.getElementById('flat_fields');

            // Hide all fields initially
            landFields.style.display = 'none';
            houseFields.style.display = 'none';
            flatFields.style.display = 'none';

            // Show relevant fields based on property type
            if (propertyType === 'Land') {
                landFields.style.display = 'block';
            } else if (propertyType === 'House') {
                houseFields.style.display = 'block';
            } else if (propertyType === 'Flat') {
                flatFields.style.display = 'block';
            }
        }
    </script>
</body>
</html>
