<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Listing</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* General Page Styles */
        body {
            font-family: 'Arial', sans-serif;
            background-image: url('/static/images/bgimage.jpg'); /* Path to your background image */
            background-size: cover; /* Make the background cover the whole page */
            background-position: center; /* Center the background image */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh; /* Full height */
            color: #fff; /* Text color for contrast */
        }

        h1 {
            color: #0a0606;
            font-size: 32px;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
        }

        form {
            background-color: rgba(255, 255, 255, 0.8); /* Semi-transparent background */
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
        }

        input[type="text"],
        textarea,
        select,
        input[type="file"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            transition: border 0.3s ease;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus,
        input[type="file"]:focus {
            border-color: #d84a58;
        }

        textarea {
            resize: vertical;
            height: 120px;
        }

        button {
            background-color: #d84a58;
            color: white;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #c6394a;
        }

        /* Responsive Design for Smaller Screens */
        @media (max-width: 768px) {
            form {
                max-width: 100%;
                padding: 20px;
            }

            h1 {
                font-size: 28px;
            }
        }
    </style>
    <script>
        function toggleFields() {
            const propertyType = document.getElementById('property_type').value;
            const landFields = document.getElementById('land_fields');
            const houseFields = document.getElementById('house_fields');
            const flatFields = document.getElementById('flat_fields');

            // Hide all fields initially
            landFields.style.display = 'none';
            houseFields.style.display = 'none';
            flatFields.style.display = 'none';

            // Show relevant fields based on property type
            if (propertyType === 'Land') {
                landFields.style.display = 'block';
            } else if (propertyType === 'House') {
                houseFields.style.display = 'block';
            } else if (propertyType === 'Flat') {
                flatFields.style.display = 'block';
            }
        }
    </script>
</head>
<body>
    <h1>Add Listing</h1>
    <form action="{{ url_for('sell') }}" method="POST" enctype="multipart/form-data">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required>

        <label for="description">Description:</label>
        <textarea id="description" name="description" required></textarea>

        <label for="price">Price:</label>
        <input type="text" id="price" name="price" required>

        <label for="location">Location:</label>
        <input type="text" id="location" name="location" required>

        <label for="property_type">Property Type:</label>
        <select id="property_type" name="property_type" required onchange="toggleFields()">
            <option value="">Select Property Type</option>
            <option value="Land">Land</option>
            <option value="House">House</option>
            <option value="Flat">Flat</option>
        </select>

        <!-- Land-specific fields -->
        <div id="land_fields" style="display: none;">
            <label for="acres">Acres:</label>
            <input type="text" id="acres" name="acres">

            <label for="facing">Facing:</label>
            <input type="text" id="facing" name="facing">
        </div>

        <!-- House-specific fields -->
        <div id="house_fields" style="display: none;">
            <label for="bhk">BHK Required:</label>
            <select id="bhk" name="bhk">
                <option value="1 BHK">1 BHK</option>
                <option value="2 BHK">2 BHK</option>
                <option value="3 BHK">3 BHK</option>
                <option value="4 BHK">4 BHK</option>
            </select>
        </div>

        <!-- Flat-specific fields -->
        <div id="flat_fields" style="display: none;">
            <label for="bhk_flat">BHK Required:</label>
            <select id="bhk_flat" name="bhk_flat">
                <option value="1 BHK">1 BHK</option>
                <option value="2 BHK">2 BHK</option>
                <option value="3 BHK">3 BHK</option>
                <option value="4 BHK">4 BHK</option>
            </select>
        </div>

        <label for="image">Image:</label>
        <input type="file" id="image" name="image" accept="image/*" required>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
