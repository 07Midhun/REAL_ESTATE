<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css"> <!-- Link to your CSS -->

    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: auto;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgb(15, 15, 15);
            background-size: cover;
            background-image: url('/static/images/bgimage.jpg');
        }

        h1 {
            margin-top: 30px;
            text-align: center;
            font-size: 36px;
            text-transform: uppercase;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5); /* Add shadow for readability */
        }

        .property-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 50px;
        }

        .property-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease; /* Smooth transition */
        }

        .property-card:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3); /* Hover effect */
        }

        .property-card img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .property-card button {
            margin-top: 15px;
            background-color: #0e0e0f;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .property-card button:hover {
            background-color: #b8bbc1; /* Button hover color */
        }

        @media (max-width: 600px) {
            .property-buttons {
                flex-direction: column;
                gap: 20px;
            }

            .property-card img {
                width: 120px;
                height: 120px;
            }
        }
    </style>
    
</head>
<body>
    <h1>Login Page</h1>

    <div class="property-buttons">
        <!-- Land button -->
        <div class="property-card">
            <img src="/static/images/land.jpg" alt="Land Property">
            <a href="{{ url_for('land') }}">
                <button>Land</button>
            </a>
        </div>

        <!-- House button -->
        <div class="property-card">
            <img src="/static/images/home.jpg" alt="House Property">
            <a href="{{ url_for('house') }}">
                <button>House</button>
            </a>
        </div>

        <!-- Flat button -->
        <div class="property-card">
            <img src="/static/images/flat.jpg" alt="Flat Property">
            <a href="{{ url_for('flat') }}">
                <button>Flat</button>
            </a>
        </div>
    </div>

</body>
</html>
