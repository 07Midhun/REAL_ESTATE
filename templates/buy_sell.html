<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ property_type }} Options</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('/static/images/bgimage.jpg');
            background-size: cover;
            background-position: center;
            margin: 0;
            padding: 20px;
            text-align: center;
            color: #fff;
        }

        h1 {
            margin-top: 30px;
            font-size: 36px;
            color: white;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 40px;
            margin-top: 50px;
        }

        .action-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            max-width: 200px;
        }

        .action-card img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid white;
            transition: transform 0.3s;
        }

        .action-card img:hover {
            transform: scale(1.05);
        }

        .action-card a button {
            margin-top: 15px;
            background-color: #0e0e0f;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .action-card a button:hover {
            background-color: #b8bbc1;
            color: #000;
        }

        @media screen and (max-width: 600px) {
            .action-buttons {
                flex-direction: column;
                align-items: center;
            }

            .action-card {
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>
    <h1>{{ property_type }} Listings</h1>

    <div class="action-buttons">
        <!-- Buy Button -->
        <div class="action-card">
            <img src="/static/images/{{ property_type|lower }}.jpg" alt="Buy {{ property_type }}">
            <a href="{{ url_for('buy_property', property=property_type|lower) }}">
                <button role="button">Buy {{ property_type }}</button>
            </a>
        </div>

        <!-- Sell Button -->
        <div class="action-card">
            <img src="/static/images/sell.jpg" alt="Sell {{ property_type }}">
            <a href="{{ url_for('sell') }}">
                <button role="button">Sell {{ property_type }}</button>
            </a>
        </div>

        <!-- Delete Button -->
        <div class="action-card">
            <img src="/static/images/delete.jpg" alt="Delete {{ property_type }}">
            <a href="{{ url_for('delete_property', property=property_type|lower) }}">
                <button role="button">Delete {{ property_type }}</button>
            </a>
        </div>
    </div>
</body>
</html>
